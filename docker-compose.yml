services:
  mysql:
    image: mysql:8.4
    container_name: course-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: RootPass2026!
      MYSQL_DATABASE: course_recommendation
      MYSQL_USER: course_user
      MYSQL_PASSWORD: CoursePass2026!
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pRootPass2026!"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: course-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: course-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    volumes:
      - backend_logs:/var/log/course-recommendation

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: course-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      TZ: Asia/Shanghai

volumes:
  mysql_data:
  redis_data:
  backend_logs:
